<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>depth-vfx</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; }
    canvas { position: fixed; top: 0; left: 0; z-index: 1; }

    /* ── launch screen ─────────────────────────────────────────────────────── */
    #launch {
      position: fixed; inset: 0; z-index: 30;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
    }
    #launch.hidden { display: none; }
    #launch-label {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 10px; letter-spacing: 0.25em; color: rgba(255,255,255,0.25);
      text-transform: uppercase;
    }
    #launch-btn {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 12px; letter-spacing: 0.2em; color: #fff;
      background: none; border: 1px solid rgba(255,255,255,0.25);
      padding: 12px 28px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border-radius: 2px;
    }
    #launch-btn:active { opacity: 0.45; }
    #launch-err {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 10px; letter-spacing: 0.08em; color: rgba(255,70,70,0.8);
      display: none; text-align: center; max-width: 260px; line-height: 1.5;
    }

    /* ── control panel ─────────────────────────────────────────────────────── */
    #panel {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%) translateY(calc(100% - 36px));
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
      width: min(360px, 92vw);
      background: rgba(6, 6, 10, 0.72);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.07);
      border-bottom: none;
      border-radius: 16px 16px 0 0;
      z-index: 20;
      padding: 0 22px 40px;
      display: none;
    }
    #panel.open { transform: translateX(-50%) translateY(0); }

    /* drag handle */
    #panel-handle {
      height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    #panel-handle::before {
      content: '';
      width: 28px; height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.18);
    }

    /* rows */
    .ctrl-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    .ctrl-row:last-child { margin-bottom: 0; }
    .ctrl-label {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 9px; letter-spacing: 0.18em; color: rgba(255,255,255,0.35);
      text-transform: uppercase; width: 52px; flex-shrink: 0;
    }
    .ctrl-val {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 9px; color: rgba(255,255,255,0.2);
      width: 24px; text-align: right; flex-shrink: 0;
    }

    /* range input */
    input[type=range] {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 2px; background: rgba(255,255,255,0.1);
      border-radius: 1px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; cursor: pointer;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.15);
    }
    input[type=range]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; border: none; cursor: pointer;
    }

    /* section divider */
    .ctrl-divider {
      height: 1px; background: rgba(255,255,255,0.05);
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <video id="cam" autoplay playsinline muted></video>

  <!-- launch screen -->
  <div id="launch">
    <p id="launch-label">depth-vfx v1</p>
    <button id="launch-btn">ACTIVATE CAMERA</button>
    <p id="launch-err"></p>
  </div>

  <!-- control panel (shown after activation) -->
  <div id="panel">
    <div id="panel-handle"></div>

    <div class="ctrl-row">
      <span class="ctrl-label">BLOOM</span>
      <input type="range" id="s-bloom" min="0" max="100" value="55">
      <span class="ctrl-val" id="v-bloom">0.8</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">RAYS</span>
      <input type="range" id="s-rays" min="0" max="100" value="60">
      <span class="ctrl-val" id="v-rays">0.6</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">BEAMS</span>
      <input type="range" id="s-beams" min="0" max="100" value="50">
      <span class="ctrl-val" id="v-beams">0.5</span>
    </div>

    <div class="ctrl-divider"></div>

    <div class="ctrl-row">
      <span class="ctrl-label">HAZE</span>
      <input type="range" id="s-haze" min="0" max="100" value="30">
      <span class="ctrl-val" id="v-haze">0.3</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">DETECT</span>
      <input type="range" id="s-detect" min="0" max="100" value="55">
      <span class="ctrl-val" id="v-detect">170</span>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass }      from 'three/addons/postprocessing/ShaderPass.js';

// ─── renderer ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.autoClear = false;
document.body.appendChild(renderer.domElement);

// ─── scenes + ortho camera ───────────────────────────────────────────────────
const orthoCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 10);
orthoCam.position.z = 5;
const bgScene  = new THREE.Scene();
const vfxScene = new THREE.Scene();

// ─── live controls ────────────────────────────────────────────────────────────
const ctrl = {
  bloom:  0.8,   // bloomPass.strength
  rays:   0.6,   // shaft opacity multiplier
  beams:  0.5,   // beam opacity multiplier
  haze:   0.3,   // particle opacity
  detect: 170,   // luma threshold (80–230)
};

// ─── pixel sampler ────────────────────────────────────────────────────────────
const SW = 80, SH = 80;
const offCanvas = Object.assign(document.createElement('canvas'), { width: SW, height: SH });
const offCtx    = offCanvas.getContext('2d', { willReadFrequently: true });

const MAX_SRCS = 6;
const GCOLS = 8, GROWS = 8;

let sources = []; // { nx, ny, str }  normalised 0..1
let darks   = []; // { nx, ny }

function sampleFrame(video) {
  if (!video.videoWidth) return;
  offCtx.drawImage(video, 0, 0, SW, SH);
  const px = offCtx.getImageData(0, 0, SW, SH).data;

  const GCW = SW / GCOLS, GCH = SH / GROWS;
  const cells = [];
  for (let row = 0; row < GROWS; row++) {
    for (let col = 0; col < GCOLS; col++) {
      let maxL = 0, wx = 0, wy = 0, wt = 0;
      const x0 = col * GCW | 0, x1 = Math.min(((col + 1) * GCW) | 0, SW);
      const y0 = row * GCH | 0, y1 = Math.min(((row + 1) * GCH) | 0, SH);
      for (let py = y0; py < y1; py++) {
        for (let px2 = x0; px2 < x1; px2++) {
          const i = (py * SW + px2) << 2;
          const L = (77 * px[i] + 150 * px[i + 1] + 29 * px[i + 2]) >> 8;
          if (L > maxL) maxL = L;
          if (L > ctrl.detect) { wx += px2 * L; wy += py * L; wt += L; }
        }
      }
      cells.push({
        maxL,
        nx: wt > 0 ? wx / wt / SW : (col + 0.5) / GCOLS,
        ny: wt > 0 ? 1 - wy / wt / SH : 1 - (row + 0.5) / GROWS,
      });
    }
  }

  cells.sort((a, b) => b.maxL - a.maxL);
  sources = cells
    .filter(c => c.maxL >= ctrl.detect)
    .slice(0, MAX_SRCS)
    .map(c => ({ nx: c.nx, ny: c.ny, str: c.maxL / 255 }));
  darks = cells.filter(c => c.maxL < 45).map(c => ({ nx: c.nx, ny: c.ny }));
}

// ─── texture helpers ──────────────────────────────────────────────────────────
function mkRadialTex(size, stops) {
  const c = Object.assign(document.createElement('canvas'), { width: size, height: size });
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  stops.forEach(([t, col]) => g.addColorStop(t, col));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(c);
}

function mkLinearTex(w, h, gx0, gy0, gx1, gy1, stops) {
  const c = Object.assign(document.createElement('canvas'), { width: w, height: h });
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(gx0, gy0, gx1, gy1);
  stops.forEach(([t, col]) => g.addColorStop(t, col));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
  return new THREE.CanvasTexture(c);
}

const glowTex = mkRadialTex(256, [
  [0,    'rgba(255,245,220,1)'],
  [0.10, 'rgba(255,220,140,0.9)'],
  [0.30, 'rgba(160,200,255,0.45)'],
  [0.65, 'rgba(70,110,255,0.08)'],
  [1,    'rgba(0,0,0,0)'],
]);

const shaftTex = mkLinearTex(16, 512, 0, 256, 0, 0, [
  [0,    'rgba(100,180,255,0)'],
  [0.38, 'rgba(200,225,255,0.35)'],
  [0.50, 'rgba(255,255,255,1)'],
  [0.62, 'rgba(200,225,255,0.35)'],
  [1,    'rgba(100,180,255,0)'],
]);

// ─── video background ─────────────────────────────────────────────────────────
let bgUniforms = null;

function initBg(videoEl) {
  const vt = new THREE.VideoTexture(videoEl);
  vt.minFilter = THREE.LinearFilter;
  vt.magFilter = THREE.LinearFilter;

  bgUniforms = {
    map:   { value: vt },
    scrAR: { value: innerWidth / innerHeight },
    vidAR: { value: 1 },
  };

  bgScene.add(new THREE.Mesh(
    new THREE.PlaneGeometry(2, 2),
    new THREE.ShaderMaterial({
      uniforms: bgUniforms,
      depthWrite: false,
      vertexShader:   `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position.xy,0.,1.); }`,
      fragmentShader: `
        uniform sampler2D map;
        uniform float scrAR, vidAR;
        varying vec2 vUv;
        void main(){
          vec2 uv = vUv;
          float r = vidAR / scrAR;
          if(r > 1.0) uv.x = (uv.x - 0.5) / r + 0.5;
          else        uv.y = (uv.y - 0.5) * r + 0.5;
          gl_FragColor = vec4(texture2D(map, uv).rgb * 0.68, 1.0);
        }`,
    })
  ));
}

// ─── glow sprites ─────────────────────────────────────────────────────────────
const glows = Array.from({ length: MAX_SRCS }, () => {
  const s = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTex, blending: THREE.AdditiveBlending,
    transparent: true, opacity: 0, depthWrite: false,
  }));
  s.scale.setScalar(0.5);
  s.position.set(0, -5, 1);
  vfxScene.add(s);
  return s;
});

// ─── shaft sprites ────────────────────────────────────────────────────────────
const N_SHAFTS = 7;
const shaftData = Array.from({ length: MAX_SRCS }, () => {
  const grp = new THREE.Group();
  grp.position.set(0, -5, 0.5);
  const shafts = Array.from({ length: N_SHAFTS }, (_, j) => {
    const baseAngle = (j / N_SHAFTS) * Math.PI;
    const len       = 0.28 + Math.random() * 0.30;
    const mat = new THREE.SpriteMaterial({
      map: shaftTex, blending: THREE.AdditiveBlending,
      transparent: true, opacity: 0, depthWrite: false, rotation: baseAngle,
    });
    const sp = new THREE.Sprite(mat);
    sp.scale.set(0.02, len, 1);
    grp.add(sp);
    return { sp, baseAngle, len };
  });
  vfxScene.add(grp);
  return { grp, shafts };
});

// ─── connector beams ──────────────────────────────────────────────────────────
const MAX_BEAMS = 4;
const beams = Array.from({ length: MAX_BEAMS }, () => {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
  const mat = new THREE.LineBasicMaterial({
    color: 0x88ccff, blending: THREE.AdditiveBlending,
    transparent: true, opacity: 0, depthWrite: false,
  });
  const line = new THREE.Line(geo, mat);
  vfxScene.add(line);
  return { line, geo };
});

// ─── haze particles ───────────────────────────────────────────────────────────
const N_HAZE = 380;
const hPos = new Float32Array(N_HAZE * 3);
const hVel = new Float32Array(N_HAZE * 2);
for (let i = 0; i < N_HAZE; i++) {
  hPos[i * 3]     = (Math.random() - 0.5) * 2;
  hPos[i * 3 + 1] = (Math.random() - 0.5) * 2;
  hPos[i * 3 + 2] = 0.3;
  hVel[i * 2]     = (Math.random() - 0.5) * 0.0012;
  hVel[i * 2 + 1] = (Math.random() * 0.7 + 0.3) * 0.0007;
}
const hazeGeo = new THREE.BufferGeometry();
hazeGeo.setAttribute('position', new THREE.BufferAttribute(hPos, 3));
const hazeMat = new THREE.PointsMaterial({
  color: 0x5588ff, size: 2, sizeAttenuation: false,
  blending: THREE.AdditiveBlending, transparent: true,
  opacity: ctrl.haze, depthWrite: false,
});
vfxScene.add(new THREE.Points(hazeGeo, hazeMat));

// ─── post-processing ──────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);

const bgPass = new RenderPass(bgScene, orthoCam);
bgPass.clearColor = new THREE.Color(0, 0, 0);
bgPass.clearAlpha = 1;
composer.addPass(bgPass);

const fxPass = new RenderPass(vfxScene, orthoCam);
fxPass.clear = false;
composer.addPass(fxPass);

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  ctrl.bloom,  // strength
  0.65,        // radius
  0.40,        // threshold (higher = less overall bloom)
);
composer.addPass(bloomPass);

composer.addPass(new ShaderPass({
  uniforms: { tDiffuse: { value: null } },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    varying vec2 vUv;
    void main(){
      vec3 c = texture2D(tDiffuse, vUv).rgb;
      c.r *= 0.93;
      c.b  = min(c.b * 1.12 + 0.025, 1.0);
      vec2 d = vUv - 0.5;
      c *= max(1.0 - dot(d, d) * 1.15, 0.0);
      gl_FragColor = vec4(c, 1.0);
    }`,
}));

// ─── resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  if (bgUniforms) bgUniforms.scrAR.value = innerWidth / innerHeight;
});

// ─── helpers ──────────────────────────────────────────────────────────────────
const ndc  = v => (v - 0.5) * 2;
const lerp = (a, b, t) => a + (b - a) * t;

// ─── main loop ────────────────────────────────────────────────────────────────
let time = 0, frameN = 0, active = false;
const camEl = document.getElementById('cam');

function update(dt) {
  time   += dt;
  frameN += 1;

  bloomPass.strength = ctrl.bloom;
  hazeMat.opacity    = ctrl.haze;

  if (frameN % 5 === 0) {
    sampleFrame(camEl);
    if (bgUniforms && camEl.videoWidth) {
      bgUniforms.vidAR.value = camEl.videoWidth / camEl.videoHeight;
    }
  }

  // ── glows + shafts ──────────────────────────────────────────────────────────
  for (let i = 0; i < MAX_SRCS; i++) {
    const src  = sources[i];
    const glow = glows[i];
    const { grp, shafts } = shaftData[i];

    if (src) {
      const tx    = ndc(src.nx);
      const ty    = ndc(src.ny);
      const pulse = 0.84 + 0.16 * Math.sin(time * 2.4 + i * 1.9);

      glow.position.x = lerp(glow.position.x, tx, 0.13);
      glow.position.y = lerp(glow.position.y, ty, 0.13);
      glow.material.opacity = src.str * pulse * 0.92;
      glow.scale.setScalar(0.32 + src.str * 0.38);

      grp.position.x = lerp(grp.position.x, tx, 0.13);
      grp.position.y = lerp(grp.position.y, ty, 0.13);

      shafts.forEach(({ sp, baseAngle, len }, j) => {
        sp.material.rotation = baseAngle + time * (0.06 + j * 0.015);
        sp.material.opacity  = src.str * (0.28 + 0.10 * Math.sin(time * 2.8 + j * 1.3)) * pulse * ctrl.rays;
        sp.scale.set(0.02, len, 1);
      });
    } else {
      glow.material.opacity *= 0.87;
      shaftData[i].shafts.forEach(({ sp }) => { sp.material.opacity *= 0.87; });
    }
  }

  // ── connector beams ─────────────────────────────────────────────────────────
  let bi = 0;
  done: for (let i = 0; i < sources.length; i++) {
    for (let j = i + 1; j < sources.length; j++) {
      if (bi >= MAX_BEAMS) break done;
      const a = sources[i], b = sources[j];
      const pos = beams[bi].geo.attributes.position;
      pos.setXYZ(0, ndc(a.nx), ndc(a.ny), 0);
      pos.setXYZ(1, ndc(b.nx), ndc(b.ny), 0);
      pos.needsUpdate = true;
      const p = 0.5 + 0.5 * Math.sin(time * 4.5 + bi * 2.3);
      beams[bi].line.material.opacity = (a.str + b.str) * 0.32 * p * ctrl.beams;
      beams[bi].line.material.color.setHSL(0.53 + 0.10 * Math.sin(time * 0.25 + bi), 1, 0.75);
      bi++;
    }
  }
  for (let i = bi; i < MAX_BEAMS; i++) {
    beams[i].line.material.opacity *= 0.88;
  }

  // ── haze particles ──────────────────────────────────────────────────────────
  for (let i = 0; i < N_HAZE; i++) {
    hPos[i * 3]     += hVel[i * 2];
    hPos[i * 3 + 1] += hVel[i * 2 + 1];
    if (hPos[i * 3 + 1] > 1.15) {
      hPos[i * 3 + 1] = -1.15;
      if (darks.length) {
        const d = darks[Math.floor(Math.random() * darks.length)];
        hPos[i * 3] = ndc(d.nx) + (Math.random() - 0.5) * 0.4;
      } else {
        hPos[i * 3] = (Math.random() - 0.5) * 2;
      }
    }
    if (hPos[i * 3] >  1.15) hPos[i * 3] = -1.15;
    if (hPos[i * 3] < -1.15) hPos[i * 3] =  1.15;
  }
  hazeGeo.attributes.position.needsUpdate = true;
}

let prevT = performance.now();
function tick() {
  requestAnimationFrame(tick);
  if (!active) return;
  const now = performance.now();
  const dt  = Math.min((now - prevT) * 0.001, 0.05);
  prevT = now;
  update(dt);
  renderer.clear();
  composer.render();
}

// ─── slider wiring ────────────────────────────────────────────────────────────
function wire(id, valId, min, max, decimals, key) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => {
    const v = min + (sl.value / 100) * (max - min);
    ctrl[key] = v;
    vl.textContent = decimals === 0 ? Math.round(v) : v.toFixed(decimals);
  });
}
wire('s-bloom',  'v-bloom',  0,   2,   1, 'bloom');
wire('s-rays',   'v-rays',   0,   1,   1, 'rays');
wire('s-beams',  'v-beams',  0,   1,   1, 'beams');
wire('s-haze',   'v-haze',   0,   1,   1, 'haze');
wire('s-detect', 'v-detect', 80, 230,  0, 'detect');

// ─── panel toggle ─────────────────────────────────────────────────────────────
const panel = document.getElementById('panel');
document.getElementById('panel-handle').addEventListener('click', () => {
  panel.classList.toggle('open');
});

// ─── camera activation ────────────────────────────────────────────────────────
document.getElementById('launch-btn').addEventListener('click', async () => {
  const errEl = document.getElementById('launch-err');
  errEl.style.display = 'none';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false,
    });
    camEl.srcObject = stream;
    await camEl.play();
    initBg(camEl);
    active = true;
    prevT  = performance.now();
    document.getElementById('launch').classList.add('hidden');
    panel.style.display = 'block';
  } catch (e) {
    errEl.textContent   = e.message || 'camera unavailable';
    errEl.style.display = 'block';
  }
});

tick();
  </script>
</body>
</html>
